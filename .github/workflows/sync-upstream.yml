name: Sync from Gitee Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout XUL-IMAI
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Add Gitee upstream
        run: git remote add upstream https://gitee.com/imai-work/imaiwork.git

      - name: Fetch upstream
        run: git fetch upstream master

      - name: Check for new commits
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/master)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new commits from upstream"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "New commits found"
            git log HEAD..upstream/master --oneline
          fi

      - name: Merge upstream changes
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "xul-sync-bot"
          git config user.email "sync@xul.rswl.ai"
          git merge upstream/master --no-edit || {
            echo "::error::Merge conflict detected! Manual resolution needed."
            exit 1
          }

      - name: Push to GitHub
        if: steps.check.outputs.has_changes == 'true'
        run: git push origin main